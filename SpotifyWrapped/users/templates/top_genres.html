{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Genre</title>
    <link rel="stylesheet" href="{% static 'css/top_genres.css' %}">
</head>
<body>

    <div class="background-shapes" id="backgroundShapes"></div>
     <div class="snow-container" id="snowContainer"></div>
            <div class="ghost-container" id="ghostContainer"></div>
    <h1 id="main-heading">Your Top Genres</h1>
    <ul>
        {% for genre, count in genres %}
        <li class="genre-box">
            <span>{{ genre }}</span>
            <span>{{ count }}</span>
        </li>
        {% endfor %}
    </ul>

    <a href="/home/" class="back-button" id="backButton">Back to Home</a>
    <button class="theme-toggle" id="themeToggle">Switch to Dark Mode</button>
    <button class="lang-toggle" id="langToggle">Switch to Spanish</button>

    <script>
        const languages = {
            en: {
                mainHeading: "Your Top Genres",
                backButton: "Back to Home",
                switchLang: "Switch to Spanish",
                themeToggle: {
                    light: "Switch to Dark Mode",
                    dark: "Switch to Halloween Mode",
                    halloween: "Switch to Christmas Mode",
                    christmas: "Switch to Light Mode"
                }
            },
            es: {
                mainHeading: "Tus Mejores Géneros",
                backButton: "Volver al Inicio",
                switchLang: "Cambiar a বাংলা",
                themeToggle: {
                    light: "Cambiar a Modo Oscuro",
                    dark: "Cambiar a Modo Halloween",
                    halloween: "Cambiar a Modo Navidad",
                    christmas: "Cambiar a Modo Normal"
                }
            },
            bn: {
                mainHeading: "আপনার সেরা ঘরানাসমূহ",
                backButton: "হোমে ফিরে যান",
                switchLang: "切换到中文",
                themeToggle: {
                    light: "ডার্ক মোডে যান",
                    dark: "হ্যালোইন মোডে যান",
                    halloween: "ক্রিসমাস মোডে যান",
                    christmas: "সাধারণ মোডে যান"
                }
            },
            zh: {
                mainHeading: "您的热门类型",
                backButton: "返回首页",
                switchLang: "Switch to English",
                themeToggle: {
                    light: "切换到深色模式",
                    dark: "切换到万圣节模式",
                    halloween: "切换到圣诞节模式",
                    christmas: "切换到普通模式"
                }
            }
        };

        let currentTheme = 'light';
        let currentLanguage = 'en';

        const toggleButton = document.getElementById('themeToggle');
        const langToggle = document.getElementById('langToggle');
        const backButton = document.getElementById('backButton');
        const body = document.body;
        
        /**
         * Updates the UI elements on the page to reflect the currently selected language.
         * It dynamically changes text content for headings, buttons, and other elements based on the language data.
         *
         * @function updateLanguage
         * @param {Object} languages - Object containing language-specific text data.
         * @param {string} currentLanguage - The currently selected language code.
         * @global
         */
        function updateLanguage() {
            const langData = languages[currentLanguage];
            document.getElementById('main-heading').textContent = langData.mainHeading;
            langToggle.textContent = langData.switchLang;
            backButton.textContent = langData.backButton;
            toggleButton.textContent = langData.themeToggle[currentTheme];
        }

        toggleButton.addEventListener('click', () => {
            body.classList.remove('dark-mode', 'halloween-mode', 'christmas-mode');

            switch (currentTheme) {
                case 'light':
                    body.classList.add('dark-mode');
                    currentTheme = 'dark';
                    break;
                case 'dark':
                    body.classList.add('halloween-mode');
                    currentTheme = 'halloween';
                    break;
                case 'halloween':
                    body.classList.add('christmas-mode');
                    currentTheme = 'christmas';
                    break;
                default:
                    currentTheme = 'light';
            }
            
            // Update the button text in current language
            toggleButton.textContent = languages[currentLanguage].themeToggle[currentTheme];
        });

        langToggle.addEventListener('click', () => {
            currentLanguage = currentLanguage === 'en' ? 'es' :
                            currentLanguage === 'es' ? 'bn' :
                            currentLanguage === 'bn' ? 'zh' : 'en';
            updateLanguage();
        });
const themes = [
    { class: "light", name: "Change Theme" },
    { class: "dark-mode", name: "Dark Mode" },
    { class: "halloween-mode", name: "Halloween Mode" },
    { class: "christmas-mode", name: "Christmas Mode" }
];

let currentThemeIndex = 0;

const themeToggleBtn = document.getElementById("themeToggle");
const snowContainer = document.getElementById("snowContainer");
const ghostContainer = document.getElementById("ghostContainer");

themeToggleBtn.addEventListener("click", () => {
    // Remove all previous theme classes
    document.body.classList.remove(
        "light",
        "dark-mode",
        "halloween-mode",
        "christmas-mode"
    );

    // Update to the next theme
    currentThemeIndex = (currentThemeIndex + 1) % themes.length;
    const newTheme = themes[currentThemeIndex];
    document.body.classList.add(newTheme.class);

    // Update the button text
    themeToggleBtn.textContent = newTheme.name;

    // Manage special effects
    if (newTheme.class === "christmas-mode") {
        generateSnowflakes();
        clearGhosts();
    } else if (newTheme.class === "halloween-mode") {
        generateGhosts();
        clearSnowflakes();
    } else {
        clearSnowflakes();
        clearGhosts();
    }
});

/**
 * Generates and displays snowflake elements on the screen.
 * Each snowflake is styled with random positioning, animation delay, 
 * and animation duration to create a natural falling effect.
 * Clears any existing snowflakes before generating new ones.
 * 
 * Behavior:
 * - Creates 100 snowflake elements.
 * - Appends them to the `snowContainer` element.
 * 
 * Dependencies:
 * - The `snowContainer` element must exist in the DOM.
 */
function generateSnowflakes() {
    clearSnowflakes();
    const numberOfSnowflakes = 100;
    for (let i = 0; i < numberOfSnowflakes; i++) {
        const snowflake = document.createElement("div");
        snowflake.classList.add("snowflake");
        snowflake.style.left = Math.random() * 100 + "vw";
        snowflake.style.animationDelay = Math.random() * 10 + "s";
        snowflake.style.animationDuration = 5 + Math.random() * 5 + "s";
        snowContainer.appendChild(snowflake);
    }
}

/**
 * Clears all snowflake elements from the screen.
 * 
 * Behavior:
 * - Empties the `snowContainer` element's contents.
 * 
 * Dependencies:
 * - The `snowContainer` element must exist in the DOM.
 */
function clearSnowflakes() {
    snowContainer.innerHTML = "";
}


/**
 * Generates and displays ghost elements on the screen.
 * Each ghost is styled with random positioning, animation delay, 
 * and animation duration to create a floating effect.
 * Clears any existing ghosts before generating new ones.
 * 
 * Behavior:
 * - Creates 20 ghost elements.
 * - Appends them to the `ghostContainer` element.
 * 
 * Dependencies:
 * - The `ghostContainer` element must exist in the DOM.
 */
function generateGhosts() {
    clearGhosts();
    const numberOfGhosts = 20;
    for (let i = 0; i < numberOfGhosts; i++) {
        const ghost = document.createElement("div");
        ghost.classList.add("ghost");

        ghost.style.left = Math.random() * 100 + "vw";
        ghost.style.animationDelay = Math.random() * 5 + "s";
        ghost.style.animationDuration = 4 + Math.random() * 4 + "s";

        ghostContainer.appendChild(ghost);
    }
}

/**
 * Clears all ghost elements from the screen.
 * 
 * Behavior:
 * - Empties the `ghostContainer` element's contents.
 * 
 * Dependencies:
 * - The `ghostContainer` element must exist in the DOM.
 */
function clearGhosts() {
    ghostContainer.innerHTML = "";
}

        /**
         * Dynamically generates decorative shapes in the background of the page.
         * The shapes are randomly sized, positioned, and animated, providing a visually engaging effect.
         *
         * @function createBackgroundShapes
         * @param {number} [numShapes=15] - The number of shapes to create (default is 15).
         * @global
         */
        function createBackgroundShapes() {
            const shapes = document.getElementById('backgroundShapes');
            const numShapes = 15;

            for (let i = 0; i < numShapes; i++) {
                const shape = document.createElement('div');
                shape.className = 'shape';

                const size = Math.random() * 200 + 50;
                const moveX = Math.random() * window.innerWidth;
                const moveY = Math.random() * window.innerHeight;

                shape.style.width = `${size}px`;
                shape.style.height = `${size}px`;
                shape.style.left = `${Math.random() * 100}%`;
                shape.style.top = `${Math.random() * 100}%`;
                shape.style.setProperty('--moveX', `${moveX}px`);
                shape.style.setProperty('--moveY', `${moveY}px`);
                shape.style.animationDelay = `${Math.random() * 20}s`;

                shapes.appendChild(shape);
            }
        }

        // Initialize
        createBackgroundShapes();
        updateLanguage();
    </script>
</body>
</html>
